services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wacdo_b2_app
    volumes:
      - uploads_data:/var/www/html/storage/uploads
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=admin_proxy"
      - "traefik.http.routers.wacdo-b2.rule=Host(`wacdo-b2.a3n.fr`)"
      - "traefik.http.routers.wacdo-b2.entrypoints=websecure"
      - "traefik.http.services.wacdo-b2.loadbalancer.server.port=80"
    networks:
      - admin_proxy
      - wacdo_internal

  db:
    image: postgres:16
    container_name: wacdo_b2_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database:/scripts:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - wacdo_internal

volumes:
  db_data:
  uploads_data:

networks:
  admin_proxy:
    external: true
  wacdo_internal:
    name: wacdo_b2_internal
